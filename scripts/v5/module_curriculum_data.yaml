      url: https://vedabase.io/en/library/bg/14/7/
      use: Katha anchor
    primary_book: Bhagavad-gītā 14 / illustrative Bhāgavatam frame
    chapter_reference: BG 14 — modes in ordinary situations
    personalities:
    - name: Figures from śāstra
      role: as named in paraphrase — no invented dialogue
    - name: KUTUMBA families
      role: listening together today
    setting: _[Facilitator transition — quiet room, families seated together]_
    narrative_paragraphs:
    - '**Paraphrase (source-grounded):** A thoughtful brāhmaṇa in a busy town learned to watch his own day through the lens
      Kṛṣṇa gives in the Fourteenth Chapter: sometimes clarity and order prevailed; sometimes restlessness and grasping; sometimes
      fog, delay, and forgetfulness.'
    - '**Paraphrase (source-grounded):** He did not call his neighbors ''a mode.'' He noticed conditions: noise, hunger, fatigue,
      competition, untidiness — and chose one small elevating action before sitting to chant.'
    - '**Paraphrase (source-grounded):** His students learned that modes mix and change, that goodness can still bind through
      pride, and that devotion beyond the modes is possible through Kṛṣṇa''s mercy.'
    - '**Facilitator transition — quiet devotional mood:** Pause. Invite families to listen as students of Kṛṣṇa — not to
      win arguments, but to receive merciful instruction through authorized sources.'
    - '**Paraphrase — setting the heart:** Before precise philosophy, the heart needs a real scene: persons, struggle, and
      turning toward the Lord. This katha supplies that scene for **C2-W4** without inventing dialogue.'
    - '**Paraphrase — Bhagavad-gītā 14.5 (application summary):** The verse is not a slogan. It names a distinction families
      can practice this week: see BG 14.5–9, 14.17–18, 14.26; environment design; clarity before chanting in one honest situation
      at home.'
    - '**Paraphrase — memory line practice:** Repeat together: _Material nature has three modes—goodness, passion and ignorance—that
      condition the eternal living being._ — then name one place this week the line might actually help (mealtime, bedtime,
      conflict, service).'
    - '**Paraphrase — Lāla–Lālī bridge:** Children learn the same truth through picture, gesture, and recall — not through
      frightening detail or public testing.'
    - '**Paraphrase — Kiśora–Kiśorī bridge:** Youth connect the narrative to one contemporary case (fictional in group work)
      and one private journal sentence — boundaries respected.'
    - '**Paraphrase — parent bridge:** Parents need not perform perfect devotion. They model willingness to hear, repair when
      wrong, and return to practice next week.'
    - '**Paraphrase — safeguarding:** Honor grief, fear, and confusion where present. Philosophy serves compassion; it does
      not shut down feeling or professional care when needed.'
    - '**Paraphrase — rights posture:** All narrative here is **paraphrase** with VedaBase links. Facilitators do not present
      invented quotes as śāstra or Prabhupāda''s exact words.'
    - '**Paraphrase — transition to lesson:** The katha opens the heart; the philosophy block trains precise language. Both
      serve Kṛṣṇa — neither replaces the other.'
    - '**Paraphrase — home practice seed:** Before leaving, each family names one trigger (time, place, or event) for the
      minimum practice connected to C2-W4.'
    - '**Paraphrase — closing posture:** End with one round of mahā-mantra or silent prayer — families leave with warmth,
      not information overload.'
    turning_point: Willingness to hear and adjust — turning toward Kṛṣṇa and śāstra together.
    central_teaching: Material nature has three modes—goodness, passion and ignorance—that condition the eternal living being.
    memory_line: Material nature has three modes—goodness, passion and ignorance—that condition the eternal living being.
    lala_cues:
    - '**Chariot/picture cue:** Three weather faces on the wall: clear sky, windy storm, sleepy fog. Teacher tells three mini-stories
      about the same playroom — tidy and quiet, noisy chase, messy and dark. Children match weather face to room, then do
      3-item tidy reset.'
    - '**Recall game:** I can choose habits that help me hear Kṛṣṇa.'
    - '**Safeguarding:** Never call a child a mode. Weather describes the room, not the person''s worth.'
    kisora_cues:
    - '**Journal prompt:** ''One sentence — how does this katha connect to the key verse and to a situation I face?'''
    - '**Pair share:** ''What misconception does this story help correct? What would responsibility with Kṛṣṇa look like?'''
    - '**Source note:** Read KUTUMBA summary + VedaBase link — no invented purports in session.'
    parent_bridge: Parents carry the week's principle into home practice. Link to [`family-home-practice.md`](family-home-practice.md)
      and Clarity Before Chanting. When children ask hard questions, turn toward śāstra together — permission to not have
      every answer immediately.
    cautions:
    - Describe room conditions, not people as sattva/rajas/tamas labels
    - Medical diets and allergies are never criticized
