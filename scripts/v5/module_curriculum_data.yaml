      win arguments, but to receive merciful instruction through authorized sources.'
    - '**Paraphrase — setting the heart:** Before precise philosophy, the heart needs a real scene: persons, struggle, and
      turning toward the Lord. This katha supplies that scene for **C3-W2** without inventing dialogue.'
    - '**Paraphrase — BG 7.7 (application summary):** The verse is not a slogan. It names a distinction families can practice
      this week: see this week''s teaching in one honest situation at home.'
