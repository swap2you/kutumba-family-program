  katha:
    title: Ajāmila's calling of Nārāyaṇa
    subtitle: SB 6.1–6.2 — Ajāmila; the decisive moment and mercy
    katha_type: source-grounded-devotional-narrative
    module_connection: Conditioning is real; meaningful choice and responsibility remain under Kṛṣṇa's guidance.
    scope_boundary: Unlimited independence from Kṛṣṇa; blaming victims; excusing abuse
    primary_sources:
    - label: SB 6.1.15
      url: https://vedabase.io/en/library/sb/6/1/15/
      use: Katha anchor
    - label: SB 6.2.1
      url: https://vedabase.io/en/library/sb/6/2/1/
      use: Katha anchor
    - label: BG 18.63
      url: https://vedabase.io/en/library/bg/18/63/
      use: Katha anchor
