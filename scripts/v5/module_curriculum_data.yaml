    - '**Paraphrase from Śrīmad-Bhāgavatam 1.1 (summary):** See controlling sources in register.'
    - '**Paraphrase from ŚB 1.1 (summary):** At Naimiṣāraṇya, sages led by Śaunaka gathered after Kṛṣṇa''s departure. They
      inquired how to act in Kali — opening the Bhāgavatam.'
    - '**Paraphrase aligned with SB 1.2.18:** Regular hearing and service cleanse the heart and fix devotion — KUTUMBA''s
      weekly protected time.'
    - '**Facilitator transition — quiet devotional mood:** Pause. Invite families to listen as students of Kṛṣṇa — not to
      win arguments, but to receive merciful instruction through authorized sources.'
    - '**Paraphrase — setting the heart:** Before precise philosophy, the heart needs a real scene: persons, struggle, and
      turning toward the Lord. This katha supplies that scene for **C1-W1** without inventing dialogue.'
    - '**Paraphrase — Śrīmad-Bhāgavatam 1.2.18 — nityaṁ bhāgavata-sevayā (application summary):** The verse is not a slogan.
      It names a distinction families can practice this week: see Six charter purposes; Friday rhythm; realistic saṅkalpa;
      temple alignment in one honest situation at home.'
    - '**Paraphrase — memory line practice:** Repeat together: _Regular hearing and service cleanse the heart and make devotion
      steady._ — then name one place this week the line might actually help (mealtime, bedtime, conflict, service).'
    - '**Paraphrase — Lāla–Lālī bridge:** Children learn the same truth through picture, gesture, and recall — not through
      frightening detail or public testing.'
    - '**Paraphrase — Kiśora–Kiśorī bridge:** Youth connect the narrative to one contemporary case (fictional in group work)
      and one private journal sentence — boundaries respected.'
    - '**Paraphrase — parent bridge:** Parents need not perform perfect devotion. They model willingness to hear, repair when
      wrong, and return to practice next week.'
    - '**Paraphrase — safeguarding:** Honor grief, fear, and confusion where present. Philosophy serves compassion; it does
      not shut down feeling or professional care when needed.'
    - '**Paraphrase — rights posture:** All narrative here is **paraphrase** with VedaBase links. Facilitators do not present
      invented quotes as śāstra or Prabhupāda''s exact words.'
    - '**Paraphrase — transition to lesson:** The katha opens the heart; the philosophy block trains precise language. Both
      serve Kṛṣṇa — neither replaces the other.'
    - '**Paraphrase — home practice seed:** Before leaving, each family names one trigger (time, place, or event) for the
      minimum practice connected to C1-W1.'
    - '**Paraphrase — closing posture:** End with one round of mahā-mantra or silent prayer — families leave with warmth,
      not information overload.'
