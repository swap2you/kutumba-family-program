      moment, the Supreme Personality of Godhead appeared as the son of Devakī and Vasudeva. The atmosphere became peaceful;
      demigods offered prayers. The Lord appeared in His four-armed form first, then, at the request of His parents, became
      visible as a human-like child — extraordinary yet approachable.'
    - '**Paraphrase — transfer to Gokula (summary):** By the Lord''s arrangement, the child was brought to Gokula under the
      care of Mother Yaśodā and Nanda Mahārāja. Geography is taught carefully: appearance in Mathurā; childhood pastimes in
      Vraja under parental care.'
    - '**Paraphrase aligned with BG 7.7 and SB 1.3.28:** There is nothing superior to Kṛṣṇa; all incarnations expand from
      Him; everything rests upon Him as pearls on a thread.'
