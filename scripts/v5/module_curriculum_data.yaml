    title: The brāhmaṇa who saw the modes in daily life
    subtitle: BG 14 — modes in ordinary situations
    katha_type: source-grounded-devotional-narrative
    module_connection: Modes are changing influences; describe conditions, not fixed identities.
    scope_boundary: Labeling people/cultures; food policing; mental-health stereotypes
    primary_sources:
    - label: BG 14.5
      url: https://vedabase.io/en/library/bg/14/5/
      use: Katha anchor
    - label: BG 14.6
      url: https://vedabase.io/en/library/bg/14/6/
      use: Katha anchor
