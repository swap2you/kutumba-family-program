  katha:
    title: King Citraketu's lesson on karma
    subtitle: SB 6.14–6.16 — Citraketu; action, reaction, and sober instruction
    katha_type: source-grounded-devotional-narrative
    module_connection: Karma is action and reaction under material nature; yajña-centered work purifies motive.
    scope_boundary: Full karma taxonomy; diagnosing others' suffering; fatalism; victim-blaming
    primary_sources:
    - label: SB 6.14.1
      url: https://vedabase.io/en/library/sb/6/14/1/
      use: Katha anchor
    - label: SB 6.15.1
      url: https://vedabase.io/en/library/sb/6/15/1/
      use: Katha anchor
    - label: BG 3.9
      url: https://vedabase.io/en/library/bg/3/9/
      use: Katha anchor
    primary_book: Śrīmad-Bhāgavatam 6.14–6.16 (selected)
    chapter_reference: SB 6.14–6.16 — Citraketu; action, reaction, and sober instruction
    personalities:
    - name: Figures from śāstra
      role: as named in paraphrase — no invented dialogue
    - name: KUTUMBA families
      role: listening together today
    setting: _[Facilitator transition — quiet room, families seated together]_
    narrative_paragraphs:
    - '**Paraphrase (source-grounded):** King Citraketu received great blessings, yet when his young son died, grief overwhelmed
      him. Sages and Nārada instructed him that the soul continues while bodies change — grief is natural, but mistaking the
      body for the whole self deepens suffering.'
    - '**Paraphrase (source-grounded):** Later, when Citraketu spoke without sufficient care toward Lord Śiva and mother Pārvatī,
      a reaction followed. The lesson is not cruel punishment for curiosity — it shows that words and attitudes are actions
      with consequences, even for a devotee.'
    - '**Paraphrase (source-grounded):** The story redirects families toward sober accountability: examine intention and method,
      repair what can be repaired, and offer work to Kṛṣṇa rather than separate selfish interest.'
    - '**Facilitator transition — quiet devotional mood:** Pause. Invite families to listen as students of Kṛṣṇa — not to
      win arguments, but to receive merciful instruction through authorized sources.'
    - '**Paraphrase — setting the heart:** Before precise philosophy, the heart needs a real scene: persons, struggle, and
      turning toward the Lord. This katha supplies that scene for **C2-W1** without inventing dialogue.'
    - '**Paraphrase — Bhagavad-gītā 3.9 (application summary):** The verse is not a slogan. It names a distinction families
      can practice this week: see BG 3.9, 3.13, 4.16–18; King Nṛga summary; intention–method–consequence analysis in one honest
      situation at home.'
    - '**Paraphrase — memory line practice:** Repeat together: _Work done only for separate material interest causes bondage;
      work done for Viṣṇu should be performed without selfish attachment._ — then name one place this week the line might
      actually help (mealtime, bedtime, conflict, service).'
    - '**Paraphrase — Lāla–Lālī bridge:** Children learn the same truth through picture, gesture, and recall — not through
      frightening detail or public testing.'
    - '**Paraphrase — Kiśora–Kiśorī bridge:** Youth connect the narrative to one contemporary case (fictional in group work)
      and one private journal sentence — boundaries respected.'
    - '**Paraphrase — parent bridge:** Parents need not perform perfect devotion. They model willingness to hear, repair when
      wrong, and return to practice next week.'
    - '**Paraphrase — safeguarding:** Honor grief, fear, and confusion where present. Philosophy serves compassion; it does
      not shut down feeling or professional care when needed.'
    - '**Paraphrase — rights posture:** All narrative here is **paraphrase** with VedaBase links. Facilitators do not present
      invented quotes as śāstra or Prabhupāda''s exact words.'
    - '**Paraphrase — transition to lesson:** The katha opens the heart; the philosophy block trains precise language. Both
      serve Kṛṣṇa — neither replaces the other.'
    - '**Paraphrase — home practice seed:** Before leaving, each family names one trigger (time, place, or event) for the
      minimum practice connected to C2-W1.'
    - '**Paraphrase — closing posture:** End with one round of mahā-mantra or silent prayer — families leave with warmth,
      not information overload.'
    turning_point: Willingness to hear and adjust — turning toward Kṛṣṇa and śāstra together.
    central_teaching: Work done only for separate material interest causes bondage; work done for Viṣṇu should be performed
      without selfish attachment.
    memory_line: Work done only for separate material interest causes bondage; work done for Viṣṇu should be performed without
      selfish attachment.
    lala_cues:
    - '**Chariot/picture cue:** Mira borrows Amma''s special bowl for pretend cooking. She returns it washed and placed on
      the shelf. Amma smiles. Next week, Ravi borrows the same bowl, leaves it outside, and rain makes it crack. Amma is sad;
      Ravi says sorry and helps glue the safe parts or replace with his savings. Same borrow — different method — different
      result.'
    - '**Recall game:** Choices are seeds. I want to plant service seeds.'
    - '**Safeguarding:** No frightening death imagery. No public shame for past mistakes. Two adults in visible space.'
    kisora_cues:
    - '**Journal prompt:** ''One sentence — how does this katha connect to the key verse and to a situation I face?'''
    - '**Pair share:** ''What misconception does this story help correct? What would responsibility with Kṛṣṇa look like?'''
    - '**Source note:** Read KUTUMBA summary + VedaBase link — no invented purports in session.'
    parent_bridge: Parents carry the week's principle into home practice. Link to [`family-home-practice.md`](family-home-practice.md)
      and Before–During–After Service Method. When children ask hard questions, turn toward śāstra together — permission to
      not have every answer immediately.
    cautions:
    - No frightening imagery for young children — focus on seeds and careful return of borrowed items
    - Do not diagnose another person's suffering as their karma
    - Honor grief in Citraketu narrative; instruction follows compassion
    visual_beats:
    - visual: Opening hook illustration
      source: opening-hook.md
    - visual: Katha beat diagram
      source: visuals/concept-map.md
    - visual: Key verse card
      source: VedaBase link
    exact_verses: []
    paraphrased_portions:
    - King Citraketu received great blessings, yet when his young son died, grief overwhelmed him. Sages and Nārada instructed
    - Later, when Citraketu spoke without sufficient care toward Lord Śiva and mother Pārvatī, a reaction followed. The lesson
    - 'The story redirects families toward sober accountability: examine intention and method, repair what can be repaired,
      and'
    omitted:
    - Graphic descriptions of Citraketu's demon birth
    - Detailed cosmology of curse mechanics
    - Using story to blame grieving parents
