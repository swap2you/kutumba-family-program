    primary_book: Śrīmad-Bhāgavatam 10.24–10.25
    chapter_reference: SB 10.24 Govardhana; SB 10.25 protection
    personalities:
    - name: Figures from śāstra
      role: as named in paraphrase — no invented dialogue
    - name: KUTUMBA families
      role: listening together today
    setting: _[Facilitator transition — quiet room, families seated together]_
    narrative_paragraphs:
    - '**Paraphrase (source-grounded):** In Vṛndāvana, Nanda Mahārāja and the residents prepared to worship Lord Indra for
      rainfall. Young Kṛṣṇa questioned this custom with gentle logic, showing that their real wealth — land, cows, children,
      and Govardhana Hill — comes from the Lord''s arrangement. He instructed them to worship Govardhana Hill, which nourishes
      them, as an offering to Him.'
    - '**Paraphrase (source-grounded):** When Indra sent devastating rains, Kṛṣṇa lifted Govardhana Hill on His little finger
      and sheltered the entire community for seven days. The residents saw that no demigod is independent of the Supreme Lord.'
    - '**Paraphrase (source-grounded):** Kṛṣṇa is the supreme enjoyer of sacrifice, proprietor of all planets, and well-wishing
      friend of every living being. The Govardhana pastime makes this visible: forgetting the Lord''s proprietorship increases
      anxiety; remembering Him restores stewardship.'
    - '**Paraphrase from ŚB 10.24.7–10.24.19:** In Vṛndāvana, Nanda Mahārāja and the residents prepared to worship Lord Indra
      for rainfall. Young Kṛṣṇa questioned this custom with gentle logic, showing that their real wealth — land, cows, children,
      and Govardhana Hill — comes from the Lord''s arrangement. He instructed them to worship Govardhana Hill, which nourishes
      them, as an offering to Him.'
    - '**Paraphrase from ŚB 10.25.9:** When Indra sent devastating rains, Kṛṣṇa lifted Govardhana Hill on His little finger
      and sheltered the entire community for seven days. The residents saw that no demigod is independent of the Supreme Lord.'
    - '**Paraphrase aligned with BG 5.29:** Kṛṣṇa is the supreme enjoyer of sacrifice, proprietor of all planets, and well-wishing
      friend of every living being. The Govardhana pastime makes this visible: forgetting the Lord''s proprietorship increases
      anxiety; remembering Him restores stewardship.'
    - '**Facilitator transition — quiet devotional mood:** Pause. Invite families to listen as students of Kṛṣṇa — not to
      win arguments, but to receive merciful instruction through authorized sources.'
    - '**Paraphrase — setting the heart:** Before precise philosophy, the heart needs a real scene: persons, struggle, and
      turning toward the Lord. This katha supplies that scene for **C3-W1** without inventing dialogue.'
    - '**Paraphrase — BG 5.29 (application summary):** The verse is not a slogan. It names a distinction families can practice
      this week: see this week''s teaching in one honest situation at home.'
    - '**Paraphrase — memory line practice:** Repeat together: _Peace comes from knowing Kṛṣṇa as the supreme enjoyer, proprietor
      of everything and friend of all living beings._ — then name one place this week the line might actually help (mealtime,
      bedtime, conflict, service).'
    - '**Paraphrase — Lāla–Lālī bridge:** Children learn the same truth through picture, gesture, and recall — not through
      frightening detail or public testing.'
    - '**Paraphrase — Kiśora–Kiśorī bridge:** Youth connect the narrative to one contemporary case (fictional in group work)
      and one private journal sentence — boundaries respected.'
    - '**Paraphrase — parent bridge:** Parents need not perform perfect devotion. They model willingness to hear, repair when
      wrong, and return to practice next week.'
    - '**Paraphrase — safeguarding:** Honor grief, fear, and confusion where present. Philosophy serves compassion; it does
      not shut down feeling or professional care when needed.'
    - '**Paraphrase — rights posture:** All narrative here is **paraphrase** with VedaBase links. Facilitators do not present
      invented quotes as śāstra or Prabhupāda''s exact words.'
    - '**Paraphrase — transition to lesson:** The katha opens the heart; the philosophy block trains precise language. Both
      serve Kṛṣṇa — neither replaces the other.'
    - '**Paraphrase — home practice seed:** Before leaving, each family names one trigger (time, place, or event) for the
      minimum practice connected to C3-W1.'
    - '**Paraphrase — closing posture:** End with one round of mahā-mantra or silent prayer — families leave with warmth,
      not information overload.'
