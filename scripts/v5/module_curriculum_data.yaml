    subtitle: SB 10.3 appearance; Gokula transfer
    katha_type: source-grounded-devotional-narrative
    module_connection: Kṛṣṇa is the Supreme Personality of Godhead — a person we can know and love.
    scope_boundary: Imprecise Vṛndāvana birth geography; cartoon trivialization
    primary_sources:
    - label: SB 10.3.1
