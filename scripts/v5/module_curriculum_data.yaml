    personalities:
    - name: Figures from śāstra
      role: as named in paraphrase — no invented dialogue
    - name: KUTUMBA families
      role: listening together today
    setting: _[Facilitator transition — quiet room, families seated together]_
    narrative_paragraphs:
    - '**Paraphrase (source-grounded):** Ajāmila lived by habits formed over years — some choices narrowed his freedom gradually,
      like a path walked many times. The tradition describes how deeply ingrained patterns matter.'
    - '**Paraphrase (source-grounded):** At the most critical moment, when fear and confusion surrounded him, he called the
      name Nārāyaṇa — the name of his youngest son, yet also the holy name of the Lord. That call was not an accident; it
      showed that even in conditioned life a turning toward the Lord can occur.'
    - '**Paraphrase (source-grounded):** The messengers of Viṣṇu intervened. The lesson for families is not sensational fear
      of death, but sober hope: the next choice matters, mercy is real, and guidance strengthens rather than removes responsibility.'
    - '**Facilitator transition — quiet devotional mood:** Pause. Invite families to listen as students of Kṛṣṇa — not to
      win arguments, but to receive merciful instruction through authorized sources.'
    - '**Paraphrase — setting the heart:** Before precise philosophy, the heart needs a real scene: persons, struggle, and
      turning toward the Lord. This katha supplies that scene for **C2-W2** without inventing dialogue.'
    - '**Paraphrase — Bhagavad-gītā 18.63 (application summary):** The verse is not a slogan. It names a distinction families
      can practice this week: see BG 18.61–63, 18.73, 3.33–34, 5.14–15; pause–remember–choose practice in one honest situation
      at home.'
    - '**Paraphrase — memory line practice:** Repeat together: _After giving knowledge, Kṛṣṇa tells Arjuna to deliberate fully
      and then act as he chooses._ — then name one place this week the line might actually help (mealtime, bedtime, conflict,
      service).'
    - '**Paraphrase — Lāla–Lālī bridge:** Children learn the same truth through picture, gesture, and recall — not through
      frightening detail or public testing.'
    - '**Paraphrase — Kiśora–Kiśorī bridge:** Youth connect the narrative to one contemporary case (fictional in group work)
      and one private journal sentence — boundaries respected.'
    - '**Paraphrase — parent bridge:** Parents need not perform perfect devotion. They model willingness to hear, repair when
      wrong, and return to practice next week.'
    - '**Paraphrase — safeguarding:** Honor grief, fear, and confusion where present. Philosophy serves compassion; it does
      not shut down feeling or professional care when needed.'
    - '**Paraphrase — rights posture:** All narrative here is **paraphrase** with VedaBase links. Facilitators do not present
      invented quotes as śāstra or Prabhupāda''s exact words.'
    - '**Paraphrase — transition to lesson:** The katha opens the heart; the philosophy block trains precise language. Both
      serve Kṛṣṇa — neither replaces the other.'
    - '**Paraphrase — home practice seed:** Before leaving, each family names one trigger (time, place, or event) for the
      minimum practice connected to C2-W2.'
    - '**Paraphrase — closing posture:** End with one round of mahā-mantra or silent prayer — families leave with warmth,
      not information overload.'
    turning_point: Willingness to hear and adjust — turning toward Kṛṣṇa and śāstra together.
    central_teaching: After giving knowledge, Kṛṣṇa tells Arjuna to deliberate fully and then act as he chooses.
    memory_line: After giving knowledge, Kṛṣṇa tells Arjuna to deliberate fully and then act as he chooses.
    lala_cues:
    - '**Chariot/picture cue:** Puppet Kāka sees his toy taken. His fists tighten and his voice gets loud. Teacher holds up
      red card: STOP. Yellow: remember — Kṛṣṇa sees me; what is the kind rule? Green: choose — ask adult for help, use words,
      or walk away. Kāka practices twice.'
    - '**Recall game:** Stop — remember Kṛṣṇa — choose care.'
    - '**Safeguarding:** Traffic-light pause is for low-risk triggers only. Danger = tell adult immediately. No blame for
      victims.'
    kisora_cues:
    - '**Journal prompt:** ''One sentence — how does this katha connect to the key verse and to a situation I face?'''
    - '**Pair share:** ''What misconception does this story help correct? What would responsibility with Kṛṣṇa look like?'''
    - '**Source note:** Read KUTUMBA summary + VedaBase link — no invented purports in session.'
    parent_bridge: Parents carry the week's principle into home practice. Link to [`family-home-practice.md`](family-home-practice.md)
      and Pause–Remember–Choose Practice. When children ask hard questions, turn toward śāstra together — permission to not
      have every answer immediately.
    cautions:
    - Never tell victims they chose the harm done to them
    - Unsafe situations require adult help immediately — not quiet endurance
    - 'Youth track: no public confession of abuse or addiction'
