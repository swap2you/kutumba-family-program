  - fact_id: FACT-KRISHNA-MATHURA-GOKULA
    domain: scripture
    canonical_wording: "Kṛṣṇa appears to Devakī and Vasudeva in Mathurā; Vasudeva carries Him to Gokula; childhood Vraja pastimes follow. Do not call the appearance 'birth in Vṛndāvana.'"
    compact_teaching_wording: "Kṛṣṇa appeared in Mathurā and grew up in Vraja."
    misleading_or_prohibited_wording:
      - "Kṛṣṇa's birth in Vṛndāvana"
      - "born in Vṛndāvana"
    primary_source_keys: [SB-10-3-1]
    stable_links: [https://vedabase.io/en/library/sb/10/3/1/]
