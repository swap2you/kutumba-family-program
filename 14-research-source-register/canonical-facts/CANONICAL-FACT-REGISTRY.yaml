facts:
  - fact_id: FACT-SB-1-2-17
    domain: scripture
    canonical_wording: "Śrīmad-Bhāgavatam 1.2.17 teaches that Śrī Kṛṣṇa, the Personality of Godhead, in the heart of the sincere hearer cleanses material desire arising from material enjoyment."
    compact_teaching_wording: "Hearing Kṛṣṇa-kathā with faith helps cleanse material desire from the heart."
    misleading_or_prohibited_wording:
      - "Bhāgavata as the ripened fruit of Vedic knowledge"
      - "SB 1.2.17 is the fruit-of-Vedas verse"
    primary_source_keys: [SB-1-2-17]
    stable_links: [https://vedabase.io/en/library/sb/1/2/17/]
    context_note: "Verse-accurate paraphrase only; no full purport in Git."
    module_applicability: [C1-W1]
    doctrinal_review_status: human-review-required
    last_checked: "2026-06-29"

  - fact_id: FACT-SB-1-2-18
    domain: scripture
    canonical_wording: "Śrīmad-Bhāgavatam 1.2.18 describes regular hearing and service to Śrīmad-Bhāgavatam cleansing the heart and fixing irrevocable devotional service."
    compact_teaching_wording: "Regular Bhāgavata hearing and service steadies devotion."
    misleading_or_prohibited_wording: []
    primary_source_keys: [SB-1-2-18]
