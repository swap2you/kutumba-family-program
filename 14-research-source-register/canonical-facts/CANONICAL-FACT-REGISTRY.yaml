  - fact_id: FACT-SB-1-2-19
    domain: scripture
    canonical_wording: "Śrīmad-Bhāgavatam 1.2.19 describes passion and ignorance, lust and hankering receding as the devotee becomes established in goodness and happiness."
    compact_teaching_wording: "Steady hearing helps passion and ignorance recede."
    misleading_or_prohibited_wording:
      - "Devotion fixed after taste develops"
      - '"Irrevocable devotion after daily service" as sole label for 1.2.19'
    primary_source_keys: [SB-1-2-19]
    stable_links: [https://vedabase.io/en/library/sb/1/2/19/]
    module_applicability: [C1-W1]
    doctrinal_review_status: human-review-required
    last_checked: "2026-06-29"

  - fact_id: FACT-SB-1-1-1
    domain: scripture
    canonical_wording: "Śrīmad-Bhāgavatam 1.1.1 is the invocation offering obeisances to the Absolute Truth from whom all emanations flow."
    compact_teaching_wording: "The Bhāgavatam begins by honoring the Absolute Truth as the source of everything."
    misleading_or_prohibited_wording:
      - "1.1.1 is the sages' inquiry"
      - '"Inquiry at Naimiṣāraṇya opens the Bhāgavatam" applied to 1.1.1 alone'
    primary_source_keys: [SB-1-1-1]
    stable_links: [https://vedabase.io/en/library/sb/1/1/1/]
    module_applicability: [C1-W1]
    doctrinal_review_status: human-review-required
    last_checked: "2026-06-29"

