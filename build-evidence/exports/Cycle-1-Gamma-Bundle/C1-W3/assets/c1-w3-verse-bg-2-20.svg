<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img">
  <title>BG 2.20 Reference</title>
  <desc>Soul not cut burned wetted dried</desc>
  <rect width="800" height="520" fill="#faf8f5"/>
<text x="400" y="42" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="20" font-weight="600">BG 2.20 Reference</text>
<rect x="120" y="80" width="560" height="60" rx="8" fill="#fff8e1" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="108" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Bhagavad-gītā 2.20</text>
<text x="400" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">KUTUMBA paraphrase — not full translation</text>
<text x="140" y="170" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="13" font-weight="normal" fill="#333">The soul is not slain when the body is slain; it is eternal and unchanging.</text>
<text x="140" y="220" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">Link: https://vedabase.io/en/library/bg/2/20/</text>
<rect x="120" y="260" width="560" height="50" rx="8" fill="#ffebee" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="288" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Misconception boundary</text>
<text x="400" y="308" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Not denial of bodily suffering</text>
<text x="140" y="350" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">Catalog: BG-2-20</text>
<text x="400" y="498" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#666">
    KUTUMBA-original · c1-w3-verse-bg-2-20 · BG-2-20 · human doctrinal review required
  </text>
