<text x="400" y="288" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Misconception boundary</text>
<text x="400" y="308" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Not a guarantee of instant success</text>
<text x="140" y="350" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">Catalog: BG-2-40</text>
<text x="400" y="498" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#666">
