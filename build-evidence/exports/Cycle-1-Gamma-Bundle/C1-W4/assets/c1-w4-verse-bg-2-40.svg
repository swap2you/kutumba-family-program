<text x="400" y="108" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Bhagavad-gītā 2.40</text>
<text x="400" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">KUTUMBA paraphrase — not full translation</text>
<text x="140" y="170" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="13" font-weight="normal" fill="#333">In this endeavor there is no loss; even a little progress protects one from great fear.</text>
<text x="140" y="220" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">Link: https://vedabase.io/en/library/bg/2/40/</text>
