<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img">
  <title>Life Crossroads</title>
  <desc>Human form as inquiry opportunity</desc>
  <rect width="800" height="520" fill="#faf8f5"/>
<text x="400" y="42" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="20" font-weight="600">Life Crossroads</text>
<rect x="60" y="80" width="300" height="180" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="210" y="108" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Crossroads sign</text>
<rect x="440" y="80" width="300" height="180" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="590" y="108" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Human duties</text>
<text x="80" y="120" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• many directions</text>
<text x="80" y="142" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• choice matters</text>
<text x="80" y="164" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• limited time</text>
<text x="460" y="120" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• inquiry</text>
<text x="460" y="142" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• practice</text>
<text x="460" y="164" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• service</text>
<rect x="60" y="290" width="320" height="50" rx="8" fill="#e8f5e9" stroke="#4a6fa5" stroke-width="2"/>
<text x="220" y="318" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Teaches</text>
<text x="220" y="338" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Human life is a deliberate choice point</text>
<rect x="420" y="290" width="320" height="50" rx="8" fill="#ffebee" stroke="#4a6fa5" stroke-width="2"/>
<text x="580" y="318" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Does NOT teach</text>
<text x="580" y="338" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Not ranking other species as worthless</text>
<text x="60" y="380" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">Source: BG-2-40 pedagogy</text>
<text x="400" y="498" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#666">
    KUTUMBA-original · c1-w4-analogy-crossroads · BG-2-40 pedagogy · human doctrinal review required
  </text>
