<text x="590" y="108" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Family offering</text>
<text x="80" y="120" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• comparison</text>
<text x="80" y="142" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• anxiety</text>
<text x="80" y="164" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• ranking</text>
<text x="460" y="120" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• gratitude</text>
<text x="460" y="142" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• shared learning</text>
<text x="460" y="164" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">• no grades</text>
