<text x="400" y="42" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="20" font-weight="600">Family Presentation Flow</text>
<rect x="60" y="80" width="300" height="180" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
