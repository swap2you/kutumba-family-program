<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img">
  <title>Family Commitment Card</title>
  <desc>One family living decision</desc>
  <rect width="800" height="520" fill="#faf8f5"/>
<text x="400" y="42" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="20" font-weight="600">Family Commitment Card</text>
<rect x="80" y="80" width="640" height="45" rx="8" fill="#e3f2fd" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="108" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Trigger</text>
<text x="400" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">After integration night</text>
<rect x="80" y="150" width="640" height="40" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="178" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 1</text>
<text x="400" y="198" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Choose one habit to continue</text>
<rect x="80" y="205" width="640" height="40" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="233" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 2</text>
<text x="400" y="253" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Write it visibly at home</text>
<rect x="80" y="260" width="640" height="40" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="288" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 3</text>
<text x="400" y="308" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Review in four weeks</text>
<rect x="80" y="325" width="300" height="45" rx="8" fill="#f3e5f5" stroke="#4a6fa5" stroke-width="2"/>
<text x="230" y="353" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Minimum version</text>
<text x="230" y="373" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">One sentence commitment</text>
<rect x="420" y="325" width="300" height="45" rx="8" fill="#ffebee" stroke="#4a6fa5" stroke-width="2"/>
<text x="570" y="353" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Opt-out / safety</text>
<text x="570" y="373" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Revise if unrealistic</text>
<text x="80" y="420" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">Source: KUT-CHARTER</text>
<text x="400" y="498" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#666">
    KUTUMBA-original · c1-w6-home-practice · KUT-CHARTER · human doctrinal review required
  </text>
</svg>