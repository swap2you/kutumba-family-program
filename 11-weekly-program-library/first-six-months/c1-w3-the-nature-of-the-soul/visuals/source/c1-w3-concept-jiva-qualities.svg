<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img">
  <title>Jīva Qualities Map</title>
  <desc>Eternal conscious fragment of Kṛṣṇa</desc>
  <rect width="800" height="520" fill="#faf8f5"/>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#4a6fa5"/>
  </marker>
</defs>
<text x="400" y="42" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="20" font-weight="600">Jīva Qualities Map</text>
<rect x="80" y="120" width="160" height="70" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="160" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Eternal</text>
<text x="160" y="168" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">not created</text>
<rect x="320" y="120" width="160" height="70" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Conscious</text>
<text x="400" y="168" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">aware</text>
<rect x="560" y="120" width="160" height="70" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="640" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Fragment</text>
<text x="640" y="168" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">part of Kṛṣṇa</text>
<rect x="200" y="260" width="160" height="70" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="280" y="288" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Seeks joy</text>
<text x="280" y="308" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">in relationship</text>
<line x1="160" y1="190" x2="640" y2="120" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="400" y1="190" x2="640" y2="120" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="640" y1="190" x2="280" y2="260" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="250" y="360" width="300" height="60" rx="8" fill="#fff3e0" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="388" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Soul is part and parcel of Kṛṣṇa</text>
<text x="60" y="440" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">Source: BG-2-20; BG-15-7</text>
<text x="400" y="498" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#666">
    KUTUMBA-original · c1-w3-concept-jiva-qualities · BG-2-20; BG-15-7 · human doctrinal review required
  </text>
</svg>