<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img">
  <title>Session Process Map</title>
  <desc>Facilitator flow for C1-W2</desc>
  <rect width="800" height="520" fill="#faf8f5"/>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#4a6fa5"/>
  </marker>
</defs>
<text x="400" y="42" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="20" font-weight="600">Session Process Map</text>
<rect x="40" y="100" width="100" height="55" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="90" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 1</text>
<text x="90" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Welcome</text>
<line x1="140" y1="127" x2="170" y2="127" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="170" y="100" width="100" height="55" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="220" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 2</text>
<text x="220" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Body/soul check-in</text>
<line x1="270" y1="127" x2="300" y2="127" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="300" y="100" width="100" height="55" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="350" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 3</text>
<text x="350" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Kathā</text>
<line x1="400" y1="127" x2="430" y2="127" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="430" y="100" width="100" height="55" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="480" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 4</text>
<text x="480" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Identity pause</text>
<line x1="530" y1="127" x2="560" y2="127" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="560" y="100" width="100" height="55" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="610" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 5</text>
<text x="610" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Practice card</text>
<line x1="660" y1="127" x2="690" y2="127" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="690" y="100" width="100" height="55" rx="8" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="2"/>
<text x="740" y="128" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Step 6</text>
<text x="740" y="148" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Close</text>
<rect x="300" y="220" width="200" height="50" rx="8" fill="#e8f5e9" stroke="#4a6fa5" stroke-width="2"/>
<text x="400" y="248" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Outcome</text>
<text x="400" y="268" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#444">Close</text>
<text x="60" y="300" text-anchor="start" font-family="Segoe UI,sans-serif" font-size="11" font-weight="normal" fill="#333">Source: C1-W2 facilitator guide</text>
<text x="400" y="498" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#666">
    KUTUMBA-original · c1-w2-session-map · C1-W2 facilitator guide · human doctrinal review required
  </text>
